<!DOCTYPE html>
<html>
<head>
    <title>March Madness Live</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: #fff;
            padding: 20px;
        }
        h1 {
            color: #38bdf8;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        .game {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .score {
            font-size: 24px;
            font-weight: bold;
        }
        .status {
            color: #94a3b8;
        }
    </style>
</head>

<body>
<h1>🏀 March Madness Live Dashboard</h1>

<div class="container" id="games"></div>

<script>
async function loadGames() {
    try {
        const res = await fetch("https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard");
        const data = await res.json();

        const container = document.getElementById("games");
        container.innerHTML = "";

        data.events.forEach(event => {
            const comp = event.competitions[0];

            const team1 = comp.competitors[0].team.displayName;
            const team2 = comp.competitors[1].team.displayName;

            const score1 = comp.competitors[0].score;
            const score2 = comp.competitors[1].score;

            const status = comp.status.type.description;

            const gameDiv = document.createElement("div");
            gameDiv.className = "game";

            gameDiv.innerHTML = `
                <h3>${team1} vs ${team2}</h3>
                <div class="score">${score1} - ${score2}</div>
                <div class="status">${status}</div>
            `;

            container.appendChild(gameDiv);
        });

    } catch (err) {
        console.error("Error loading data:", err);
    }
}

// Load immediately
loadGames();

// Refresh every 30 seconds
setInterval(loadGames, 30000);
</script>

</body>
</html>
