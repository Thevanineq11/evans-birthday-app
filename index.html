<!DOCTYPE html>
<html>
<head>
<title>March Madness Pick’em</title>
<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
h1 { color:#38bdf8; }
.revision { color:#facc15; font-size:14px; margin-bottom:10px; }
.bracket { display:grid; grid-template-columns: repeat(4, 1fr); gap:20px; }
.round { display:flex; flex-direction:column; gap:15px; }
.matchup { background:#1e293b; padding:10px; border-radius:10px; }
.team { padding:5px; cursor:pointer; }
.team:hover { background:#334155; }
.selected { background:#22c55e; }
.scoreboard { margin-top:30px; background:#1e293b; padding:15px; border-radius:10px; }
.turn { margin-bottom:10px; color:#facc15; }
.debug { margin-top:20px; font-size:12px; color:#f87171; }
</style>
</head>

<body>

<h1>🏀 March Madness Multiplayer Pick’em</h1>

<!-- Visible Revision Label -->
<div class="revision">Revision: v1.3</div>

<input id="name" placeholder="Enter your name">
<button onclick="join()">Join Game</button>

<div class="turn" id="turn"></div>
<div class="bracket" id="bracket"></div>

<div class="scoreboard">
<h2>Scoreboard</h2>
<div id="scores"></div>
</div>

<div class="debug" id="debug"></div>

<script>
const SUPABASE_URL = "https://nxkchposugwdluzzdqix.supabase.co";
const SUPABASE_KEY = "sb_publishable_TIr37sPlGAtqiCgtw4rdvA_jve-ECLl";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const players = ["Evan","Beto","Maddie","Scott","Luke","Andy","West"];
let player = null;
let currentTurn = 0;

function debug(msg){ document.getElementById("debug").innerText = msg; }

// --- JOIN GAME ---
async function join() {
    player = document.getElementById("name").value.trim();
    if (!player) { alert("Enter your name!"); return; }
    if (!players.includes(player)) { alert("Name not allowed!"); return; }

    alert("Joined as " + player);
    renderTurn();
}

// --- LOAD GAMES ---
async function loadGames() {
    const { data: games, error } = await supabase.from("games").select("*");
    if (error) { debug("Error loading games: " + error.message); return; }
    if (!games.length) { debug("No games in the database! Add first-round matchups."); return; }

    renderBracket(games);
    calculateScores(games);
}

// --- RENDER BRACKET ---
async function renderBracket(games) {
    const bracketDiv = document.getElementById("bracket");
    bracketDiv.innerHTML = "";

    const { data: picksData } = await supabase.from("picks").select("*");
    const picksMap = {};
    picksData.forEach(p => picksMap[p.game_id] = p);

    games.forEach(g => {
        const div = document.createElement("div");
        div.className = "matchup";

        const pick = picksMap[g.id]?.pick || "";

        div.innerHTML = `
            <h4>${g.team1} vs ${g.team2}</h4>
            <div class="team ${pick===g.team1?'selected':''}" onclick="makePick('${g.id}','${g.team1}')">${g.team1} (${g.score1})</div>
            <div class="team ${pick===g.team2?'selected':''}" onclick="makePick('${g.id}','${g.team2}')">${g.team2} (${g.score2})</div>
        `;

        bracketDiv.appendChild(div);
    });

    renderTurn();
}

// --- PICK FUNCTION ---
async function makePick(gameId, team) {
    if (!player) { alert("Join first!"); return; }

    const { data: turnData } = await supabase.from("turn").select("*").eq("id",1).single();
    if (players[turnData.index] !== player) { alert("Not your turn!"); return; }

    const { data: existingPick } = await supabase.from("picks").select("*").eq("game_id", gameId);
    if (existingPick.length) return;

    await supabase.from("picks").insert([{ game_id: gameId, player: player, pick: team }]);
    const nextIndex = (turnData.index + 1) % players.length;
    await supabase.from("turn").update({ index: nextIndex }).eq("id",1);

    loadGames();
}

// --- RENDER CURRENT TURN ---
async function renderTurn() {
    const { data: turnData } = await supabase.from("turn").select("*").eq("id",1).single();
    currentTurn = turnData.index;
    document.getElementById("turn").innerText = "Current Turn: " + players[currentTurn];
}

// --- CALCULATE SCORES ---
async function calculateScores(games) {
    const scores = {};
    players.forEach(p=>scores[p]=0);

    const { data: picksData } = await supabase.from("picks").select("*");

    games.forEach(g => {
        const winner = g.score1>g.score2 ? g.team1 : g.team2;
        picksData.forEach(p => { if(p.pick===winner) scores[p.player]++; });
    });

    const div = document.getElementById("scores");
    div.innerHTML = "";
    players.forEach(p => div.innerHTML += `<p>${p}: ${scores[p]}</p>`);
}

// --- REAL-TIME UPDATES ---
supabase.from("picks").on("INSERT", payload => loadGames()).subscribe();
supabase.from("turn").on("UPDATE", payload => renderTurn()).subscribe();
supabase.from("games").on("UPDATE", payload => loadGames()).subscribe();

// --- INIT ---
loadGames();
</script>
</body>
</html>
