<!DOCTYPE html>
<html>
<head>
<title>March Madness Multiplayer Pick’em</title>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background: #0f172a; color: white; padding: 20px; }
h1 { color: #38bdf8; }
.bracket { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
.matchup { background: #1e293b; padding: 10px; border-radius: 10px; }
.team { padding: 5px; cursor: pointer; }
.team:hover { background: #334155; }
.selected { background: #22c55e; }
.scoreboard { margin-top: 30px; background: #1e293b; padding: 15px; border-radius: 10px; }
.turn { margin-bottom: 10px; color: #facc15; }
</style>
</head>

<body>

<h1>🏀 March Madness Multiplayer Pick’em</h1>

<input id="name" placeholder="Enter your name">
<button onclick="join()">Join Game</button>

<div class="turn" id="turn"></div>

<div class="bracket" id="bracket"></div>

<div class="scoreboard">
<h2>Scoreboard</h2>
<div id="scores"></div>
</div>

<script>
// 1️⃣ Initialize Supabase
const SUPABASE_URL = "https://nxkchposugwdluzzdqix.supabase.co";
const SUPABASE_KEY = "sb_publishable_TIr37sPlGAtqiCgtw4rdvA_jve-ECLl";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Players
const players = ["Evan","Maddie","Beto","Luke","Scott","Andy","West"];
let player = null;

// Join game
function join() {
    player = document.getElementById("name").value;
    if (!player) alert("Enter your name!");
    else alert("Joined as " + player);
}

// Load bracket games
async function loadGames() {
    let { data: games } = await supabase
        .from("games")
        .select("*");

    render(games);
    calculateScores(games);
}

// Render bracket
function render(games) {
    document.getElementById("bracket").innerHTML = "";
    games.forEach(g => {
        const div = document.createElement("div");
        div.className = "matchup";

        supabase
          .from("picks")
          .select("*")
          .eq("game_id", g.id)
          .then(({data}) => {

        const pick = data.length ? data[0].pick : "";

        div.innerHTML = `
            <h4>${g.team1} vs ${g.team2}</h4>
            <div class="team ${pick === g.team1 ? "selected" : ""}"
                onclick="makePick('${g.id}','${g.team1}')">${g.team1} (${g.score1})</div>

            <div class="team ${pick === g.team2 ? "selected" : ""}"
                onclick="makePick('${g.id}','${g.team2}')">${g.team2} (${g.score2})</div>
        `;

        document.getElementById("bracket").appendChild(div);
        });
    });

    renderTurn();
}

// Handle pick
async function makePick(gameId, team) {
    if (!player) { alert("Join first!"); return; }

    let { data } = await supabase
        .from("picks")
        .select("*")
        .eq("game_id", gameId);

    if (data.length) {
        // If already picked, do nothing
        return;
    }

    await supabase
        .from("picks")
        .insert([{ game_id: gameId, player: player, pick: team }]);

    nextTurn();
    loadGames();
}

// Scoreboard
async function calculateScores(games) {
    let scores = {};
    players.forEach(p => scores[p] = 0);

    let { data: picks } = await supabase.from("picks").select("*");

    games.forEach(g => {
        const winner = g.score1>g.score2 ? g.team1 : g.team2;
        picks.forEach(p => {
            if (p.pick === winner) scores[p.player]++;
        });
    });

    const scoreDiv = document.getElementById("scores");
    scoreDiv.innerHTML = "";
    players.forEach(p => {
        scoreDiv.innerHTML += `<p>${p}: ${scores[p]}</p>`;
    });
}

// Turn indicator
async function renderTurn() {
    let { data } = await supabase
        .from("turn")
        .select("*")
        .single();

    document.getElementById("turn").innerText =
        "Current Turn: " + players[data.index];
}

// Next Turn
async function nextTurn() {
    let { data } = await supabase.from("turn").select("*").single();
    let next = (data.index + 1) % players.length;
    await supabase.from("turn").update({ index: next }).eq("id", data.id);
}

// Auto refresh
setInterval(loadGames, 30000);
loadGames();
</script>

</body>
</html>
